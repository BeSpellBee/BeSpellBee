<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-yellow: #FFD700;
            --primary-blue: #2B65EC;
            --dark-bg: #1a1a1a;
            --soft-white: #f9f9f9;
        }

        body {
            background: #eef2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* Main container */
        .contact-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* YELLOW BORDERED CONTAINER - matches your good.jpg */
        .yellow-border-container {
            border: 3px solid var(--primary-yellow);
            border-radius: 20px;
            margin: 24px;
            padding: 32px 28px 40px 28px;
            background: white;
        }

        /* LOGO - centered at the top */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 24px;
        }

        .contact-logo {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            background: #fff8e7;
            padding: 8px;
        }

        /* Headline */
        .headline {
            text-align: center;
            margin-bottom: 20px;
        }

        .headline h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e2a36;
            margin-bottom: 8px;
        }

        .headline p {
            color: #666;
            font-size: 0.95rem;
        }

        /* Features row - One to one, 30 mins, Zoom Meeting with checkmarks */
        .features-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--soft-white);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #333;
        }

        .feature i {
            color: var(--primary-yellow);
            font-size: 1.1rem;
        }

        .feature .check {
            background: var(--primary-yellow);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #1e2a36;
        }

        /* Iframe wrapper - centered */
        .iframe-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .iframe-wrapper iframe {
            max-width: 100%;
            width: 750px;
            height: 560px;
            border: none;
            border-radius: 16px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .yellow-border-container {
                margin: 16px;
                padding: 20px 16px 28px 16px;
            }

            .headline h2 {
                font-size: 1.3rem;
            }

            .features-row {
                gap: 12px;
            }

            .feature {
                padding: 5px 14px;
                font-size: 0.85rem;
            }

            .iframe-wrapper iframe {
                height: 480px;
            }
        }
    </style>
    <title>Be SpellBee | Free Trial Session</title>
    <link rel="icon" href="https://lh3.googleusercontent.com/drive-viewer/AKGpihYranxMDZGIwq2vt9-ECjkRyV0Lg6GJpH9sjhXrAJUVu3dKqBnhz_kETqzLZ5ONyml33ggbUyahKJwJtjg0SAL8IrJ270-9PPM=s2560">
</head>
<body>

<div class="contact-container">
    <!-- YELLOW BORDERED CONTAINER -->
    <div class="yellow-border-container">
        
        <!-- LOGO - centered at the top -->
        <div class="logo-wrapper">
            <img src="images3/original.logo.jpg" class="contact-logo" alt="Be SpellBee Logo">
        </div>

        <!-- HEADLINE -->
        <div class="headline">
            <h2>Can't make up your mind? <br>Book a free 30-minute trial session</h2>
            <p>Planifiez une discussion de 30 minutes avec BeSpellBee à l'heure qui vous convient le mieux.</p>
        </div>

        <!-- FEATURES ROW (One to one, 30 mins, Zoom Meeting) -->
        <div class="features-row">
            <div class="feature">
                <i class="fas fa-user-check check"></i>
                <span>One to one</span>
            </div>
            <div class="feature">
                <i class="fas fa-clock check"></i>
                <span>30 mins</span>
            </div>
            <div class="feature">
                <i class="fab fa-zoom check"></i>
                <span>Zoom Meeting</span>
            </div>
        </div>

        <!-- ZOOM SCHEDULER IFRAME - centered -->
        <div class="iframe-wrapper">
            <iframe src="https://scheduler.zoom.us/be-spellbee/30-minutes-avec-be?embed=true" frameborder="0" title="Zoom Scheduler"></iframe>
        </div>
    </div>
</div>
