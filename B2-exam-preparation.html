    /* ===== GLOBAL RESET & BASE (using millionaire game colors) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a2634;  /* dark background to match game feel */

      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 12px;
    }

    /* main game card – all colors from your spec: #0056B3, #FFEB3B, #1976D2, #000000, #FFFFFF */
    .game-container {
      max-width: 760px;
      width: 100%;
      background: #FFFFFF;
      border-radius: 32px;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.35);
      overflow: hidden;
      border: 1px solid rgba(0,86,179,0.15);
    }

    /* ===== header ===== */
    .header {

      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

      color: #000000;
      font-size: 1rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 40px;
      margin-left: 10px;
    }
