<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Desert Adventure</title>
    <style>
        body { margin:0; padding:0; background:#000; text-align:center; font-family:Arial; }
        #game-container { margin:auto; }
    </style>
    
     
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    
</head>
<body>
<h1>Desert Adventure</h1>
<div id="game-container"></div>
    <div id="riddle-container" style="position:absolute; top:620px; text-align:center; width:100%;">
    <p style="color:white;">Riddle: I speak without a mouth and hear without ears. What am I?</p>
    <input type="text" id="riddle-answer" placeholder="Type your answer here">
    <button id="riddle-submit">Submit</button>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};


const game = new Phaser.Game(config);

let hero, cursors, enemy;
let riddleSolved = false;

function preload() {
    // Load your images
    this.load.image('desert', 'images/UrbanMetastasis.png');
    this.load.image('hero', 'images/hero1.png');
    this.load.image('enemy', 'images/enemy2.png');
}

function create() {
    // Background
    let bg = this.add.image(400, 300, 'desert');
    bg.setDisplaySize(800, 600); // stretch to canvas size

    // Hero
    hero = this.physics.add.sprite(100, 500, 'hero');
    hero.setCollideWorldBounds(true);
    hero.setScale(0.15); // scale down to fit nicely

    // Enemy
    enemy = this.physics.add.sprite(600, 500, 'enemy');
    enemy.setCollideWorldBounds(true);
    enemy.setScale(0.15);

    // Controls
    cursors = this.input.keyboard.createCursorKeys();

    // Collision detection
    this.physics.add.overlap(hero, enemy, encounterEnemy, null, this);

    // Dialogue text
    this.add.text(20, 20, "Your friend disappeared on a quest...", { font: "18px Arial", fill: "#fff" });

   // Riddle logic
document.getElementById('riddle-submit').addEventListener('click', () => {
    const answer = document.getElementById('riddle-answer').value.trim().toLowerCase();
    if(answer === 'echo'){
        alert('Correct! You solved the riddle!');
        riddleSolved = true;
        document.getElementById('riddle-container').style.display = 'none';
    } else {
        alert('Wrong! Try again.');
    }
});

}

function update() {
    hero.setVelocity(0);

    if (cursors.left.isDown) hero.setVelocityX(-200);
    if (cursors.right.isDown) hero.setVelocityX(200);
    if (cursors.up.isDown) hero.setVelocityY(-200);
    if (cursors.down.isDown) hero.setVelocityY(200);
}

function encounterEnemy(hero, enemy) {
    if (!riddleSolved) {
        alert("You cannot defeat the desert raider until you solve the riddle!");
    } else {
        alert("You defeat the desert raider! Onward to your journey...");
        enemy.destroy();
    }
}
</script>
</body>
</html>
