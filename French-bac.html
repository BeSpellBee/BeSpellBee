<!-- ========== LMS: Password Protected (Working Gate) ========== -->
<style>
    .lms-wrapper {
        max-width: 1100px;
        margin: 60px auto 20px auto;
        background: #FFFFFF;
        border-radius: 32px;
        box-shadow: 0 20px 35px -8px rgba(0,0,0,0.35);
        overflow: hidden;
        border: 4px solid #FFEB3B;
        font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .lms-header {
        background: #0056B3;
        padding: 18px 24px;
        color: white;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
    }
    .lms-header h2 { font-weight: 600; font-size: 1.4rem; margin: 0; display: flex; align-items: center; gap: 8px; }
    .lms-badge { background: #FFEB3B; color: #000; font-size: 0.95rem; font-weight: 700; padding: 5px 14px; border-radius: 40px; }
    .lms-body { padding: 24px; background: #FFFFFF; }
    .lms-gate { background: #f5f7fc; border-radius: 24px; padding: 30px 20px; text-align: center; max-width: 500px; margin: 0 auto; border: 2px solid #eef4fe; }
    .lms-gate input { padding: 14px 20px; border: 2px solid #dde3ed; border-radius: 60px; font-size: 1rem; width: 100%; max-width: 300px; outline: none; margin: 10px 0; }
    .lms-gate input:focus { border-color: #1976D2; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.2); }
    .lms-gate button { padding: 14px 32px; background: #1976D2; border: none; color: white; font-weight: 700; font-size: 1.1rem; border-radius: 60px; border-bottom: 4px solid #0d3d70; cursor: pointer; }
    .lms-gate button:hover { background: #0056B3; }
    .lms-gate .error { color: #b71c1c; margin-top: 10px; }
    .lms-view { display: none; }
    .lms-view.active { display: block; }
    .module-card { background: #f5f7fc; border-radius: 24px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #FFEB3B; }
    .module-card h3 { color: #0056B3; margin-top: 0; }
    .lesson-item { display: flex; justify-content: space-between; align-items: center; background: #FFFFFF; padding: 12px 18px; border-radius: 16px; border: 1px solid #eef4fe; margin: 8px 0; cursor: pointer; }
    .lesson-item:hover { background: #e3f2fd; }
    .lesson-item .status { font-size: 0.8rem; padding: 4px 12px; border-radius: 40px; background: #eef4fe; color: #666; }
    .lesson-item .status.done { background: #c8e6c9; color: #1d6b2c; }
    .lesson-content { background: #f5f7fc; padding: 24px; border-radius: 24px; line-height: 1.7; }
    .lesson-content iframe { width: 100%; height: 500px; border: 2px solid #eef4fe; border-radius: 16px; background: #FFFFFF; margin-top: 15px; }
    .nav-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 2px solid #eef4fe; }
    .nav-row button, .nav-row a { background: #1976D2; color: white; padding: 12px 28px; border-radius: 60px; border: none; font-weight: 600; cursor: pointer; border-bottom: 4px solid #0d3d70; text-decoration: none; }
    .nav-row button:hover, .nav-row a:hover { background: #0056B3; }
    .nav-row .complete-btn { background: #FFEB3B; color: #000; border-bottom: 4px solid #c5a605; }
    .nav-row .complete-btn:hover { background: #f1df2c; }
    .question-block { background: #FFFFFF; padding: 20px; border-radius: 24px; margin-bottom: 20px; border-left: 6px solid #1976D2; }
    .question-block label { display: block; margin: 8px 0; padding: 10px 16px; background: #f5f7fc; border-radius: 40px; cursor: pointer; }
    .question-block label:hover { background: #e3f2fd; }
    .quiz-result { margin-top: 20px; padding: 20px; border-radius: 24px; display: none; }
    .quiz-result.pass { background: #c8e6c9; border-left: 6px solid #1d6b2c; display: block; }
    .quiz-result.fail { background: #ffcdd2; border-left: 6px solid #b71c1c; display: block; }
    @media (max-width: 600px) { .lesson-content iframe { height: 350px; } .nav-row { flex-direction: column; align-items: stretch; } .nav-row button, .nav-row a { text-align: center; } }
</style>

    window.courseData = {

                        content: `

                            <ul>
                                <li><strong>Break the ice</strong> – start a conversation.</li>
                                <li><strong>Hit the nail on the head</strong> – say exactly the right thing.</li>

                            <iframe src="https://app.lumi.education/api/v1/run/SlF7eK/embed" frameborder="0" allowfullscreen="allowfullscreen"></iframe>
                        `
                    },
                    {
                        id: 'q2',
                        title: 'Vocabulary Quiz',
                        type: 'quiz',
                        questions: [
                            { question: 'To "break the ice" means to:', options: ['A) Start a conversation', 'B) Break something frozen', 'C) End a fight'], correct: 0 },
                            { question: 'If something "costs an arm and a leg", it is:', options: ['A) Cheap', 'B) Expensive', 'C) Free'], correct: 1 }
                        ]
                    }
                ]
            }
        ]
    };

    // ============================================================
    // LMS FUNCTIONS (using window.courseData)
    // ============================================================
    function getProgress() {
        const saved = localStorage.getItem('lmsProgress');
        return saved ? JSON.parse(saved) : {};
    }
    function saveProgress(prog) {
        localStorage.setItem('lmsProgress', JSON.stringify(prog));
    }
    function isCompleted(lessonId) {
        const prog = getProgress();
        return prog[lessonId] && prog[lessonId].completed === true;
    }
    function markCompleted(lessonId) {
        const prog = getProgress();
        prog[lessonId] = { completed: true };
        saveProgress(prog);
    }
    function showView(viewId) {
        document.querySelectorAll('.lms-view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
    }
    function showDashboard() {
        showView('viewDashboard');
        renderDashboard();
    }
    function renderDashboard() {
    const container = document.getElementById('dashboardContent');
    if (!container) return;
    let html = `
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px;">
            <h2 style="color: #0056B3; border-left: 6px solid #FFEB3B; padding-left: 16px; margin:0;">📋 Course Dashboard</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button onclick="sendProgress()" style="background:#FFEB3B; color:#000; border:none; padding:10px 20px; border-radius:40px; cursor:pointer; font-weight:600; border-bottom:4px solid #c5a605;">
                    📤 Send Progress to Teacher
                </button>
            </div>
        </div>
        <div id="moduleList"></div>
    `;
    container.innerHTML = html;

    const moduleList = document.getElementById('moduleList');
    let listHtml = '';
    // ✅ Use window.courseData – not a separate "data" variable
    if (window.courseData && window.courseData.modules) {
        window.courseData.modules.forEach(mod => {
            listHtml += `<div class="module-card"><h3>📌 ${mod.title}</h3>`;
            mod.lessons.forEach(lesson => {
                const done = isCompleted(lesson.id) ? 'done' : '';
                let label = isCompleted(lesson.id) ? '✅ Completed' : (lesson.type === 'quiz' ? '🧠 Quiz' : '📖 Lesson');
                if (lesson.type === 'quiz') {
                    const prog = getProgress();
                    const data2 = prog[lesson.id];
                    if (data2 && data2.completed) {
                        label = `✅ Completed (${data2.score}/${data2.total})`;
                    }
                }
                const icon = lesson.type === 'quiz' ? '🧠' : '📖';
                listHtml += `
                    <div class="lesson-item" onclick="openLesson('${mod.id}','${lesson.id}')">
                        <span>${icon} ${lesson.title}</span>
                        <span class="status ${done}">${label}</span>
                    </div>
                `;
            });
            listHtml += `</div>`;
        });
    } else {
        listHtml = '<p style="color:red;">❌ Course data missing – please contact support.</p>';
    }
    moduleList.innerHTML = listHtml;
}
   function openLesson(moduleId, lessonId) {
    const data = window.courseData;   // ✅ get from window
    const module = data.modules.find(m => m.id === moduleId);
    const lesson = module.lessons.find(l => l.id === lessonId);
    if (lesson.type === 'quiz') {
        showView('viewQuiz');
        renderQuiz(lesson);
    } else {
        showView('viewLesson');
        renderLesson(lesson, moduleId);
    }
}
    function renderLesson(lesson, moduleId) {
        const container = document.getElementById('lessonContent');
        const done = isCompleted(lesson.id);
        container.innerHTML = `
            <h2 style="color: #0056B3;">${lesson.title}</h2>
            <div class="lesson-content">${lesson.content}</div>
            <div class="nav-row">
                <button onclick="showDashboard()">← Dashboard</button>
                <div>
                    ${!done ? `<button class="complete-btn" onclick="markLessonComplete('${lesson.id}')">✅ Mark as Complete</button>` : '<span style="color:#1d6b2c; font-weight:600;">✅ Completed</span>'}
                </div>
            </div>
        `;
    }
    function markLessonComplete(lessonId) {
        markCompleted(lessonId);
        alert('✅ Lesson marked as complete!');
        showDashboard();
    }
    function renderQuiz(quiz) {
        const container = document.getElementById('quizContent');
        let html = `<h2 style="color: #0056B3;">🧠 ${quiz.title}</h2>`;
        html += `<form id="quizForm">`;
        quiz.questions.forEach((q, idx) => {
            html += `
                <div class="question-block">
                    <p><strong>${idx+1}. ${q.question}</strong></p>
                    ${q.options.map((opt, oi) => `
                        <label><input type="radio" name="q${idx}" value="${oi}"> ${opt}</label>
                    `).join('')}
                </div>
            `;
        });
        html += `
                <button type="button" class="complete-btn" style="background:#FFEB3B; color:#000; border:none; padding:14px 32px; border-radius:60px; font-weight:700; cursor:pointer; border-bottom:4px solid #c5a605;" onclick="submitQuiz('${quiz.id}')">✅ Check Answers</button>
            </form>
            <div id="quizResult" class="quiz-result"></div>
            <div class="nav-row" style="margin-top:20px;">
                <button onclick="showDashboard()">← Dashboard</button>
            </div>
        `;
        container.innerHTML = html;
    }
    function submitQuiz(quizId) {
       function submitQuiz(quizId) {
    let quizData = null;
    const data = window.courseData;   // ✅ get from window
    for (let m of data.modules) {
        const found = m.lessons.find(l => l.id === quizId);
        if (found) { quizData = found; break; }
    }
    if (!quizData) return;
    // ... rest of the function (unchanged)
}

        const questions = quizData.questions;
        let score = 0;
        let allAnswered = true;

        for (let i = 0; i < questions.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) { allAnswered = false; continue; }
            if (parseInt(selected.value) === questions[i].correct) score++;
        }

        const resultDiv = document.getElementById('quizResult');
        if (!allAnswered) {
            resultDiv.className = 'quiz-result fail';
            resultDiv.innerHTML = '<p style="color:#b71c1c;">⚠️ Please answer all questions before submitting.</p>';
            return;
        }

        const total = questions.length;
        const passed = score >= total * 0.6;

        const prog = getProgress();
        prog[quizId] = { completed: true, score: score, total: total };
        saveProgress(prog);

        if (passed) {
            resultDiv.className = 'quiz-result pass';
            resultDiv.innerHTML = `<h3>✅ You scored ${score}/${total}. Well done!</h3>`;
        } else {
            resultDiv.className = 'quiz-result fail';
            resultDiv.innerHTML = `<h3>❌ You scored ${score}/${total}. Review the lessons and try again.</h3>`;
        }
        document.querySelectorAll('#quizForm input[type="radio"]').forEach(el => el.disabled = true);
    }
   function generateReport() {
    const prog = getProgress();
    let report = "=== Progress Report ===\n";
    report += "Generated: " + new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString() + "\n\n";
    const data = window.courseData;   // ✅ get from window
    data.modules.forEach(mod => {
        // ... rest unchanged
    });
    // ...
}
            report += `📌 ${mod.title}\n`;
            mod.lessons.forEach(lesson => {
                const data2 = prog[lesson.id];
                if (lesson.type === 'quiz') {
                    if (data2 && data2.completed) {
                        report += `  🧠 ${lesson.title}: ✅ Completed (Score: ${data2.score}/${data2.total})\n`;
                    } else {
                        report += `  🧠 ${lesson.title}: ⬜ Not started\n`;
                    }
                } else {
                    const status = data2 && data2.completed ? "✅ Completed" : "⬜ Not started";
                    report += `  📖 ${lesson.title}: ${status}\n`;
                }
            });
            report += "\n";
        });
        report += "=== End of Report ===";
        return report;
    }
    function downloadProgress() {
        const report = generateReport();
        const blob = new Blob([report], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `progress_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
    }
    function sendProgress() {
        const report = generateReport();
        document.getElementById('reportSubject').value = 'Progress Report – B2 Exam Prep Course';
        document.getElementById('reportBody').value = report;
        const form = document.getElementById('reportForm');
        const btn = document.querySelector('[onclick="sendProgress()"]');
        if (btn) {
            btn.innerText = '📤 Sending...';
            btn.disabled = true;
        }
        fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
        })
        .then(response => {
            if (response.ok) {
                alert('✅ Progress report sent successfully!');
            } else {
                alert('❌ Sending failed. Please use the Download button.');
            }
            if (btn) {
                btn.innerText = '📤 Send Progress to Teacher';
                btn.disabled = false;
            }
        })
        .catch(() => {
            alert('❌ Network error. Please use the Download button.');
            if (btn) {
                btn.innerText = '📤 Send Progress to Teacher';
                btn.disabled = false;
            }
        });
    }

    // ============================================================
    // UNLOCK FUNCTION (works reliably now)
    // ============================================================
    function unlockLMS() {
        const input = document.getElementById('lmsPassword');
        const error = document.getElementById('lmsGateError');
        const entered = input.value.trim();

        if (entered === ACCESS_CODE) {
            // Hide gate, show course
            document.getElementById('lmsGate').style.display = 'none';
            document.getElementById('lmsViews').style.display = 'block';
            localStorage.setItem('lmsUnlocked', 'true');
            renderDashboard();
            error.innerText = '';
        } else {
            error.innerText = '❌ Incorrect access code. Please try again.';
            input.value = '';
            input.focus();
        }
    }

    // Allow Enter key on the password field
    document.getElementById('lmsPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') unlockLMS();
    });

    // ============================================================
    // ON PAGE LOAD: Check if user already unlocked
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('lmsUnlocked') === 'true') {
            document.getElementById('lmsGate').style.display = 'none';
            document.getElementById('lmsViews').style.display = 'block';
            renderDashboard();
        }
        // Otherwise, gate stays visible – user must enter password.
    });
</script>
